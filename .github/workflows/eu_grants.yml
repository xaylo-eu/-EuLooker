name: EU Grants Agent

on:
  schedule:
    - cron: "0 7 * * *"  # every day at 7:00 UTC (9:00 SK time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run EU Grants Agent
        run: python eu_grants_agent.py
        env:
          EMAIL_HESLO: ${{ secrets.EMAIL_HESLO }}

      - name: Save history and users
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add seen_identifiers.json users.json
          git commit -m "update history + users [skip ci]" || echo "nothing to commit"
          git push
